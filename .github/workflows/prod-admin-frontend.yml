name: PROD - Admin Frontend Build and Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-admin-frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  DIST: monorepo/dist/apps/admin-frontend/browser

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: monorepo

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: monorepo/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate config.json from template
        run: envsubst < apps/admin-frontend/public/config.tpl.json > apps/admin-frontend/public/config.json
        env:
          ADMIN_BACKEND_URL: ${{ vars.ADMIN_BACKEND_URL }}
          AUTH_LOGIN_URL: ${{ vars.AUTH_LOGIN_URL }}

      - name: Build
        run: pnpm nx build admin-frontend --configuration production

      - name: Write deployment info
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p ${{ env.DIST }}
          echo "branch=${GITHUB_REF_NAME}" > ${{ env.DIST }}/deploy-info.txt
          echo "commit=$(git rev-parse --short HEAD)" >> ${{ env.DIST }}/deploy-info.txt
          echo "time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> ${{ env.DIST }}/deploy-info.txt

      - name: Remove config template from dist
        working-directory: ${{ github.workspace }}
        run: rm -f ${{ env.DIST }}/config.tpl.json

      - name: Deploy to Cloudflare Pages
        working-directory: ${{ github.workspace }}
        run: |
          pnpm dlx wrangler pages deploy "${{ env.DIST }}" \
            --project-name "${{ vars.CF_PROJECT_NAME }}" \
            --branch "${{ github.ref_name }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
