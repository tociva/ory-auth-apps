dsn: ${KRATOS_DSN}

serve:
  public:
    base_url: ${KRATOS_SERVE_PUBLIC_BASE_URL}
    cors:
      enabled: true
      allowed_origins: [${CORS_ALLOWED_ORIGINS}]
      allowed_methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed_headers:
        - Authorization
        - Content-Type
        - Cookie
      exposed_headers:
        - Content-Type
        - Set-Cookie
      allow_credentials: true
  admin:
    base_url: ${KRATOS_ADMIN_URL}

cookies:
  same_site: Lax
  domain: ${KRATOS_COOKIES_DOMAIN}

selfservice:
  # OAuth transactions provide the opaque transaction callback explicitly.
  # Non-orchestrated browser flows fall back to a safe error surface.
  default_browser_return_url: ${AUTH_URL}/auth/error
  allowed_return_urls:
    - ${AUTH_URL}/oauth2/login/complete
    - ${AUTH_URL}/login/return
    - ${AUTH_URL}/settings
    - ${AUTH_URL}/settings/return
    - ${KRATOS_URLS_LOGOUT}

  methods:
    password:
      enabled: false
    totp:
      config:
        issuer: Kratos
      enabled: true
    lookup_secret:
      enabled: true
    link:
      enabled: true
    code:
      enabled: true
    oidc:
      enabled: true
      config:
        providers:
          - id: google
            provider: google
            mapper_url: file:///etc/config/kratos/oidc.google.mapper.jsonnet
            client_id: ${GOOGLE_CLIENT_ID}
            client_secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - email
              - profile
            auth_url: https://accounts.google.com/o/oauth2/v2/auth
            token_url: https://www.googleapis.com/oauth2/v4/token
            issuer_url: https://accounts.google.com
          # BEGIN optional apple provider
          - id: apple
            provider: apple
            mapper_url: file:///etc/config/kratos/oidc.apple.mapper.jsonnet
            client_id: ${APPLE_CLIENT_ID}
            apple_team_id: ${APPLE_TEAM_ID}
            apple_private_key_id: ${APPLE_PRIVATE_KEY_ID}
            # In .env, render APPLE_PRIVATE_KEY as a valid YAML string
            # (for example, a double-quoted PEM with \n escapes).
            apple_private_key: ${APPLE_PRIVATE_KEY}
            issuer_url: https://appleid.apple.com
            scope:
              - email
          # END optional apple provider

  flows:
    error:
      ui_url: ${AUTH_URL}/auth/error

    settings:
      ui_url: ${AUTH_URL}/settings
      privileged_session_max_age: 15m
      required_aal: highest_available

    # Recovery/verification are email-based flows. With social-only OIDC there is
    # no UI for them and no real SMTP configured, so they are disabled.
    # Re-enable and build the UI + configure SMTP if email flows are needed.
    recovery:
      enabled: false
      ui_url: ${AUTH_URL}/recovery
      use: code

    verification:
      enabled: false
      ui_url: ${AUTH_URL}/verification
      use: code
      after:
        default_browser_return_url: ${AUTH_URL}/login/return

    logout:
      after:
        default_browser_return_url: ${KRATOS_URLS_LOGOUT}

    login:
      ui_url: ${AUTH_URL}/auth/login
      lifespan: 10m

    registration:
      enabled: true
      lifespan: 10m
      ui_url: ${AUTH_URL}/registration
      after:
        # Social sign-up goes through the OIDC flow. Without this session hook a
        # first-time user is created but NOT logged in, forcing a "retry".
        oidc:
          hooks:
            - hook: session

log:
  level: ${KRATOS_LOG_LEVEL}
  format: text
  leak_sensitive_values: false

secrets:
  cookie:
    - ${KRATOS_CSRF_COOKIE_SECRET}
  cipher:
    - ${KRATOS_CIPHER_SECRET}

ciphers:
  algorithm: xchacha20-poly1305

hashers:
  algorithm: bcrypt
  bcrypt:
    cost: 12

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: smtps://test:test@mailslurper:1025/?skip_ssl_verify=true
