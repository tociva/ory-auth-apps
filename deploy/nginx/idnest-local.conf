# Local HTTPS reverse proxy for the idnest.dev auth deployment (Mac/Homebrew).
# Drop into /opt/homebrew/etc/nginx/servers/ and `sudo nginx -t && sudo brew services restart nginx`.
#
# One mkcert certificate covers every host below (see README Step 4):
#   sudo mkcert -cert-file idnest-local.pem -key-file idnest-local-key.pem \
#     auth-local.idnest.dev hydra-local.idnest.dev kratos-local.idnest.dev \
#     api-local.idnest.dev admin-local.idnest.dev app-local.daybook.cloud
#
# Cookie domain is .idnest.dev, so all auth hosts share the SSO session. The
# product app (app-local.daybook.cloud) is a separate OAuth client — included
# here only for single-machine local testing.

ssl_certificate     /opt/homebrew/etc/nginx/ssl/idnest-local.pem;
ssl_certificate_key /opt/homebrew/etc/nginx/ssl/idnest-local-key.pem;

# --- auth-backend: server-rendered login/consent/logout/error -> :4000 ------
server {
  listen 443 ssl;
  server_name auth-local.idnest.dev;
  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

# --- Hydra public (OAuth2 / OIDC: authorize, token, .well-known) -> :4444 ----
server {
  listen 443 ssl;
  server_name hydra-local.idnest.dev;
  location / {
    proxy_pass http://127.0.0.1:4444;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
  }
}

# --- Kratos public (self-service, whoami, sessions) -> :4433 ----------------
server {
  listen 443 ssl;
  server_name kratos-local.idnest.dev;
  location / {
    proxy_pass http://127.0.0.1:4433;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
  }
}

# --- admin-backend API -> :4100 ---------------------------------------------
server {
  listen 443 ssl;
  server_name api-local.idnest.dev;
  location / {
    proxy_pass http://127.0.0.1:4100;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

# --- admin-frontend Angular dev server -> :4201 -----------------------------
server {
  listen 443 ssl;
  server_name admin-local.idnest.dev;
  location / {
    proxy_pass http://127.0.0.1:4201;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;   # Angular HMR websocket
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto https;
  }
}

# --- product app dev server (OAuth client; adjust the port) -> :5173 --------
server {
  listen 443 ssl;
  server_name app-local.daybook.cloud;
  location / {
    proxy_pass http://127.0.0.1:5173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto https;
  }
}

# --- redirect plain HTTP to HTTPS -------------------------------------------
server {
  listen 80;
  server_name auth-local.idnest.dev hydra-local.idnest.dev kratos-local.idnest.dev
              api-local.idnest.dev admin-local.idnest.dev app-local.daybook.cloud;
  return 301 https://$host$request_uri;
}
