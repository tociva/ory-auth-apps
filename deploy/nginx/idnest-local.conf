# Local HTTPS reverse proxy for the idnest auth platform (Mac/Homebrew).
# Brand: idnest (this file). Deployment hosts: *.daybook.cloud (one deployment
# per app — this one serves the daybook.cloud product).
#
# Drop into /opt/homebrew/etc/nginx/servers/ then:
#   sudo nginx -t && sudo brew services restart nginx
#
# One mkcert certificate covers every host below (see README Step 4):
#   sudo mkcert -cert-file local.daybook.cloud.pem -key-file local.daybook.cloud-key.pem \
#     auth-local.daybook.cloud hydra-local.daybook.cloud kratos-local.daybook.cloud \
#     admin-api-local.daybook.cloud admin-local.daybook.cloud \
#     api-local.daybook.cloud app-local.daybook.cloud
#
# Cookie domain is .daybook.cloud, so all hosts share the SSO session.
# api-local (:3001) and app-local (:5173) are the daybook PRODUCT backend and
# frontend — they're OAuth consumers, not part of the auth stack, included here
# only for single-machine local testing.

ssl_certificate     /opt/homebrew/etc/nginx/ssl/local.daybook.cloud.pem;
ssl_certificate_key /opt/homebrew/etc/nginx/ssl/local.daybook.cloud-key.pem;

# --- auth-backend: server-rendered login/consent/logout/error -> :4000 ------
server {
  listen 443 ssl;
  server_name auth-local.daybook.cloud;
  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

# --- Hydra public (OAuth2 / OIDC: authorize, token, .well-known) -> :4444 ----
server {
  listen 443 ssl;
  server_name hydra-local.daybook.cloud;
  location / {
    proxy_pass http://127.0.0.1:4444;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
  }
}

# --- Kratos public (self-service, whoami, sessions) -> :4433 ----------------
server {
  listen 443 ssl;
  server_name kratos-local.daybook.cloud;
  location / {
    proxy_pass http://127.0.0.1:4433;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
  }
}

# --- admin-backend API -> :4100 ---------------------------------------------
server {
  listen 443 ssl;
  server_name admin-api-local.daybook.cloud;
  location / {
    proxy_pass http://127.0.0.1:4100;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

# --- admin-frontend Angular dev server -> :4501 -----------------------------
server {
  listen 443 ssl;
  server_name admin-local.daybook.cloud;
  location / {
    proxy_pass http://127.0.0.1:4501;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;   # Angular HMR websocket
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto https;
  }
}

# --- daybook PRODUCT backend / resource server (OAuth consumer) -> :3001 ----
server {
  listen 443 ssl;
  server_name api-local.daybook.cloud;
  location / {
    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

# --- daybook PRODUCT frontend dev server (OAuth client; adjust port) -> :5173 -
server {
  listen 443 ssl;
  server_name app-local.daybook.cloud;
  location / {
    proxy_pass http://127.0.0.1:5173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto https;
  }
}

# --- redirect plain HTTP to HTTPS -------------------------------------------
server {
  listen 80;
  server_name auth-local.daybook.cloud hydra-local.daybook.cloud kratos-local.daybook.cloud
              admin-api-local.daybook.cloud admin-local.daybook.cloud
              api-local.daybook.cloud app-local.daybook.cloud;
  return 301 https://$host$request_uri;
}
