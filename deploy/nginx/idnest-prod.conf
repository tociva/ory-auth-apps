# Production HTTPS reverse proxy for the idnest auth platform.
# Brand: idnest (this file). Deployment hosts: *.daybook.cloud.
# Assumes a wildcard TLS cert for *.daybook.cloud (e.g. Let's Encrypt DNS-01).
# The daybook product hosts (api.daybook.cloud backend, app.daybook.cloud
# frontend) are separate deployments / OAuth consumers and are NOT proxied here.
# Note: api.daybook.cloud is the product backend; the admin API is admin-api.daybook.cloud.
#
# Hydra admin (:4445) and Kratos admin (:4434) must stay on a private network —
# never add server blocks for them.

ssl_certificate     /etc/letsencrypt/live/daybook.cloud/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/daybook.cloud/privkey.pem;

# Harden TLS (tune to your policy).
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers on;

# --- auth-backend: login/consent/logout/error -> :4000 ----------------------
server {
  listen 443 ssl;
  server_name auth.daybook.cloud;
  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

# --- Hydra public -> :4444 --------------------------------------------------
server {
  listen 443 ssl;
  server_name hydra.daybook.cloud;
  location / {
    proxy_pass http://127.0.0.1:4444;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
  }
}

# --- Kratos public -> :4433 -------------------------------------------------
server {
  listen 443 ssl;
  server_name kratos.daybook.cloud;
  location / {
    proxy_pass http://127.0.0.1:4433;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
  }
}

# --- admin-backend API -> :4100 ---------------------------------------------
server {
  listen 443 ssl;
  server_name admin-api.daybook.cloud;
  location / {
    proxy_pass http://127.0.0.1:4100;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

# --- admin-frontend: static build of the Angular console --------------------
server {
  listen 443 ssl;
  server_name admin.daybook.cloud;
  root /var/www/admin-frontend;          # output of `nx build admin-frontend`
  location / {
    try_files $uri $uri/ /index.html;    # SPA fallback
  }
}

# --- redirect plain HTTP to HTTPS -------------------------------------------
server {
  listen 80;
  server_name auth.daybook.cloud hydra.daybook.cloud kratos.daybook.cloud
              admin-api.daybook.cloud admin.daybook.cloud;
  return 301 https://$host$request_uri;
}
