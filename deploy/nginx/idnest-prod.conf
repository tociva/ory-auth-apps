# Production HTTPS reverse proxy for the idnest.dev auth deployment.
# Assumes a wildcard TLS cert for *.idnest.dev (e.g. Let's Encrypt DNS-01).
# The product app (app.daybook.cloud) is a separate deployment / OAuth client
# and is NOT proxied here.
#
# Hydra admin (:4445) and Kratos admin (:4434) must stay on a private network —
# never add server blocks for them.

ssl_certificate     /etc/letsencrypt/live/idnest.dev/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/idnest.dev/privkey.pem;

# Harden TLS (tune to your policy).
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers on;

# --- auth-backend: login/consent/logout/error -> :4000 ----------------------
server {
  listen 443 ssl;
  server_name auth.idnest.dev;
  location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

# --- Hydra public -> :4444 --------------------------------------------------
server {
  listen 443 ssl;
  server_name hydra.idnest.dev;
  location / {
    proxy_pass http://127.0.0.1:4444;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
  }
}

# --- Kratos public -> :4433 -------------------------------------------------
server {
  listen 443 ssl;
  server_name kratos.idnest.dev;
  location / {
    proxy_pass http://127.0.0.1:4433;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
  }
}

# --- admin-backend API -> :4100 ---------------------------------------------
server {
  listen 443 ssl;
  server_name api.idnest.dev;
  location / {
    proxy_pass http://127.0.0.1:4100;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

# --- admin-frontend: static build of the Angular console --------------------
server {
  listen 443 ssl;
  server_name admin.idnest.dev;
  root /var/www/admin-frontend;          # output of `nx build admin-frontend`
  location / {
    try_files $uri $uri/ /index.html;    # SPA fallback
  }
}

# --- redirect plain HTTP to HTTPS -------------------------------------------
server {
  listen 80;
  server_name auth.idnest.dev hydra.idnest.dev kratos.idnest.dev
              api.idnest.dev admin.idnest.dev;
  return 301 https://$host$request_uri;
}
