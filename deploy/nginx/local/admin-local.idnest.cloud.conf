# admin-frontend Angular dev server -> :4501
server {
  listen 443 ssl;
  server_name admin-local.idnest.cloud;

  ssl_certificate     /opt/homebrew/etc/nginx/ssl/local.idnest.cloud.pem;
  ssl_certificate_key /opt/homebrew/etc/nginx/ssl/local.idnest.cloud-key.pem;

  location / {
    proxy_pass http://localhost:4501;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;   # Angular HMR websocket
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 80;
  server_name admin-local.idnest.cloud;
  return 301 https://$host$request_uri;
}
