# Kratos public: self-service flows, whoami, sessions -> :4433
server {
  listen 443 ssl;
  server_name kratos-local.idnest.cloud;

  ssl_certificate     /opt/homebrew/etc/nginx/ssl/local.idnest.cloud.pem;
  ssl_certificate_key /opt/homebrew/etc/nginx/ssl/local.idnest.cloud-key.pem;

  location / {
    proxy_pass http://localhost:4433;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
  }
}

server {
  listen 80;
  server_name kratos-local.idnest.cloud;
  return 301 https://$host$request_uri;
}
