# admin-frontend: static build of the Angular console
server {
  listen 443 ssl;
  server_name admin.idnest.cloud;

  ssl_certificate     /etc/letsencrypt/live/idnest.cloud/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/idnest.cloud/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  root /var/www/admin-frontend;        # output of `nx build admin-frontend`
  location / {
    try_files $uri $uri/ /index.html;  # SPA fallback
  }
}

server {
  listen 80;
  server_name admin.idnest.cloud;
  return 301 https://$host$request_uri;
}
