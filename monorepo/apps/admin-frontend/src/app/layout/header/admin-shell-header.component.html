<header class="admin-header">
  <div class="header-left">
    <tng-icon [icon]="drawerCollapsed ? 'panel-left-open' : 'panel-left-close'"
     size="1.125rem"
     class="header-drawer-toggle"
     (click)="drawerToggle.emit()"
     />
    <div class="header-title">
      <span class="eyebrow">Security administration</span>
      <h1>{{ pageTitle }}</h1>
    </div>
  </div>

  <app-search-button class="header-search" />

  <div class="header-actions">
    <tng-icon
      class="header-theme-trigger"
      icon="palette"
      size="0.875rem"
      [tngMenuTriggerFor]="themeMenu"
    />

    <tng-menu
      #themeMenu="tngMenu"
      class="header-theme-menu"
      ariaLabel="Theme"
      (tngMenuSelect)="onThemeMenuSelect($event)"
    >
      <div tngMenuGroupLabel>Theme</div>
      @for (option of themeOptions; track option.value) {
        <button
          type="button"
          tngMenuItem
          tngMenuItemRole="menuitemradio"
          [tngMenuItemValue]="option.value"
          [tngMenuItemChecked]="themeService.themeName() === option.value"
        >
          {{ option.label }}
        </button>
      }
    </tng-menu>

    <button
      class="header-icon-button header-mode-toggle"
      type="button"
      aria-label="Toggle color mode"
      (click)="toggleModeChange()"
    >
      <tng-icon [icon]="themeService.darkMode() ? 'sun' : 'moon'" size="0.875rem" />
    </button>

    <div class="admin-profile">
      <button class="profile-trigger" type="button" [tngMenuTriggerFor]="profileMenu">
        <tng-avatar [fallback]="displayName || 'Admin'" size="sm" />
        <span class="profile-trigger-name">{{ displayName || "Admin" }}</span>
      </button>

      <tng-menu
        #profileMenu="tngMenu"
        ariaLabel="Account options"
        (tngMenuSelect)="onProfileMenuSelect($event)"
      >
        <div tngMenuGroupLabel>Session</div>
        <button type="button" tngMenuItem tngMenuItemValue="logout">Logout</button>
      </tng-menu>
    </div>
  </div>
</header>
