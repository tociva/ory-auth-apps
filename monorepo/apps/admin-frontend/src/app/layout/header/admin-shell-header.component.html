<header class="admin-header">
  <div class="header-left">
    <tng-button
      type="button"
      appearance="ghost"
      tone="neutral"
      size="sm"
      class="header-icon-button header-drawer-toggle"
      (click)="drawerToggle.emit()"
    >
      <tng-icon
        [icon]="drawerCollapsed ? 'panel-left-open' : 'panel-left-close'"
        size="1.125rem"
        class="header-action-icon"
        aria-hidden="true"
      />
      <span class="header-icon-button-label">Toggle navigation drawer</span>
    </tng-button>
    <div class="header-title">
      <span class="eyebrow">Security administration</span>
      <h1>{{ pageTitle }}</h1>
    </div>
  </div>

  <app-search-button class="header-search" />

  <div class="header-actions">
    <tng-button
      type="button"
      appearance="ghost"
      tone="neutral"
      size="sm"
      class="header-icon-button header-theme-trigger"
      [tngMenuTriggerFor]="themeMenu"
    >
      <tng-icon icon="palette" size="0.875rem" class="header-action-icon" aria-hidden="true" />
      <span class="header-icon-button-label">Choose theme</span>
    </tng-button>

    <tng-menu
      #themeMenu="tngMenu"
      class="header-theme-menu"
      ariaLabel="Theme"
      (tngMenuSelect)="onThemeMenuSelect($event)"
    >
      <div tngMenuGroupLabel>Theme</div>
      @for (option of themeOptions; track option.value) {
        <button
          type="button"
          tngMenuItem
          tngMenuItemRole="menuitemradio"
          [tngMenuItemValue]="option.value"
          [tngMenuItemChecked]="themeService.themeName() === option.value"
        >
          {{ option.label }}
        </button>
      }
    </tng-menu>

    <tng-button
      type="button"
      appearance="ghost"
      tone="neutral"
      size="sm"
      class="header-icon-button header-mode-toggle"
      (click)="toggleModeChange()"
    >
      <tng-icon
        [icon]="themeService.darkMode() ? 'sun' : 'moon'"
        size="0.875rem"
        class="header-action-icon"
        aria-hidden="true"
      />
      <span class="header-icon-button-label">Toggle color mode</span>
    </tng-button>

    <div class="admin-profile">
      <button class="profile-trigger" type="button" [tngMenuTriggerFor]="profileMenu">
        <tng-avatar [fallback]="displayName || 'Admin'" size="sm" />
        <span class="profile-trigger-name">{{ displayName || "Admin" }}</span>
      </button>

      <tng-menu
        #profileMenu="tngMenu"
        ariaLabel="Account options"
        (tngMenuSelect)="onProfileMenuSelect($event)"
      >
        <div tngMenuGroupLabel>Session</div>
        <button type="button" tngMenuItem tngMenuItemValue="logout">Logout</button>
      </tng-menu>
    </div>
  </div>
</header>
