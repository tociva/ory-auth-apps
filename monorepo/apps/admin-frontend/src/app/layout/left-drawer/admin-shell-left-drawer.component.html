<aside
  id="admin-drawer"
  class="admin-drawer"
  [class.drawer-collapsed]="collapsed"
  aria-label="Admin navigation"
>
  <div class="drawer-brand">
    <div class="brand-mark" aria-hidden="true">
      <tng-icon icon="shield-check" size="1.125rem" />
    </div>
    @if (!collapsed) {
      <div class="brand-copy">
        <span class="brand-name">idnest</span>
        <span class="brand-subtitle">Admin Console</span>
      </div>
    }
  </div>

  <tng-separator decorative />

  <nav class="drawer-menu" aria-label="Primary">
    <tng-listbox
      class="drawer-listbox"
      ariaLabel="Admin navigation"
      [options]="navItems"
      [getOptionValue]="getChildValue"
      [getOptionLabel]="getChildLabel"
      [value]="activePath"
      [typeahead]="false"
      [loop]="true"
      (valueChange)="onNavValueChange($event)"
    >
      <ng-template #tngListboxOptionTpl let-ctx>
        @if (collapsed) {
          <tng-tooltip
            class="drawer-option-tooltip"
            [text]="ctx.label"
            [ariaLabel]="ctx.label"
            side="right"
          >
            <span trigger class="drawer-option-row drawer-option-row--collapsed">
              <tng-icon [icon]="ctx.option.icon" size="1.125rem" class="drawer-option-leading-icon" aria-hidden="true" />
            </span>
          </tng-tooltip>
        } @else {
          <span class="drawer-option-row">
            <tng-icon [icon]="ctx.option.icon" size="1rem" class="drawer-option-leading-icon" aria-hidden="true" />
            <span class="drawer-option-label">{{ ctx.label }}</span>
            <tng-icon
              icon="chevron-right"
              size="1rem"
              class="drawer-option-trailing-icon"
              [class.drawer-option-trailing-icon--visible]="ctx.selected"
              aria-hidden="true"
            />
          </span>
        }
      </ng-template>
    </tng-listbox>
  </nav>
</aside>
