<div class="admin-shell" [class.drawer-collapsed]="drawerCollapsed">
  <app-admin-shell-left-drawer
    [collapsed]="drawerCollapsed"
    [navGroups]="navGroups"
    [activePath]="activePath()"
    (navSelect)="onNavValueChange($event)"
  />

  <div class="admin-workspace">
    <app-admin-shell-header
      [drawerCollapsed]="drawerCollapsed"
      [pageTitle]="pageTitle"
      [displayName]="displayName"
      (drawerToggle)="toggleDrawer()"
      (logout)="signOut()"
    />
    <app-admin-shell-main-content />
  </div>
</div>
