<div class="page-center">
  <tng-card variant="outline" [elevated]="true" padding="lg" class="consent-card">
    @if (error) {
      <tng-card-content>
        <div class="alert alert-error">Error: {{ error }}</div>
      </tng-card-content>
      <tng-card-footer>
        <button type="button" class="btn btn-primary" (click)="goToLogin()">Go to Login</button>
      </tng-card-footer>
    } @else {
      <tng-card-content class="consent-loading">
        <tng-progress-spinner [indeterminate]="true" ariaLabel="Processing consent" [size]="40" />
        <h1 class="status-heading status-pulse">Processing consent…</h1>
        <p class="status-body">Verifying and redirecting you to the app.</p>
      </tng-card-content>
    }
  </tng-card>
</div>
