<div class="page-center page-bg-error">
  <tng-card variant="solid" [elevated]="true" padding="lg" class="error-card">
    <tng-card-header>
      <h1 class="error-title">Oops, something went wrong</h1>
    </tng-card-header>

    @if (readableHint) {
      <div class="alert alert-warning">
        <strong class="hint-title">What this usually means</strong>
        <p class="hint-body">{{ readableHint }}</p>
      </div>
    }

    <tng-card-content>
      <div class="details-row">
        <tng-label>Error details</tng-label>
        <button type="button" class="btn btn-outline btn-sm" (click)="copy()">
          {{ copied ? "Copied!" : "Copy" }}
        </button>
      </div>
      <pre class="error-pre">{{ safeDetailsJson }}</pre>
    </tng-card-content>

    <tng-card-footer>
      <a href="/" class="link">Go back home</a>
    </tng-card-footer>
  </tng-card>
</div>
