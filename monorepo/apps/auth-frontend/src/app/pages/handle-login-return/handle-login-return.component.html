<div class="page-center page-bg-subtle">
  <tng-card variant="outline" [elevated]="true" padding="lg" class="auth-card">
    @if (error) {
      <tng-card-content>
        <div class="alert alert-error">
          <h2 class="box-title">Authentication Issue</h2>
          <p class="box-body">{{ error }}</p>
          @if (loginChallenge) {
            <button type="button" class="btn btn-primary btn-sm" (click)="retry()">
              Retry Login
            </button>
          }
        </div>
      </tng-card-content>
    } @else {
      <tng-card-content class="loading-stack">
        <tng-progress-spinner [indeterminate]="true" ariaLabel="Authenticating" [size]="40" />
        <h1 class="status-heading status-pulse">Authenticating...</h1>
        <p class="status-body">Verifying session and redirecting you to the consent screen.</p>
      </tng-card-content>
    }
  </tng-card>
</div>
