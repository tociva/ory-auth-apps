<div class="page-center login-bg">
  @if (loading) {
    <div class="status-center">
      <tng-progress-spinner [indeterminate]="true" ariaLabel="Checking session" [size]="40" />
      <h1 class="status-heading status-pulse">Checking session...</h1>
      <p class="status-body">Preparing secure login flow, please wait.</p>
    </div>
  } @else if (error) {
    <div class="status-center">
      <div class="alert alert-error">{{ error }}</div>
      <button type="button" class="btn btn-primary" (click)="goHome()">Go to Home</button>
    </div>
  } @else if (flowReady) {
    <tng-card variant="outline" [elevated]="true" padding="lg" class="login-card">
      <tng-card-header>
        <h1 class="brand-name">idnest</h1>
        <p class="brand-tagline">Sign in to continue</p>
      </tng-card-header>

      <tng-card-content>
        <button type="button" class="btn btn-outline btn-google" (click)="signInWithGoogle()">
          <svg class="google-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          <span>Sign in with Google</span>
        </button>
      </tng-card-content>

      <tng-card-footer>
        <p class="terms-text">
          By signing in, you agree to our
          <a href="/terms" class="link">Terms &amp; Conditions</a>
          and
          <a href="/privacy" class="link">Privacy Policy</a>.
        </p>
      </tng-card-footer>
    </tng-card>
  }
</div>
