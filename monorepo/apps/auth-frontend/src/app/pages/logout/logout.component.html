<div class="page-center logout-bg">
  <tng-card variant="ghost" padding="lg" class="logout-card">
    @if (loading && !error) {
      <tng-card-content>
        <div class="logout-loading">
          <tng-progress-spinner [indeterminate]="true" ariaLabel="Signing out" [size]="36" />
          <div>
            <h2 class="logout-heading">Signing you out…</h2>
            <p class="logout-subtext">Closing your session securely. This may take a moment.</p>
          </div>
        </div>
      </tng-card-content>
    } @else if (error) {
      <tng-card-content>
        <h2 class="logout-heading logout-heading--error">We couldn't complete the logout</h2>
        <p class="logout-error">{{ error }}</p>
      </tng-card-content>
      <tng-card-actions align="start">
        <button type="button" class="btn btn-white" (click)="reload()">Try again</button>
        <a href="/" class="btn btn-ghost">Go to Homepage</a>
      </tng-card-actions>
    } @else {
      <tng-card-content class="logout-success">
        <h2 class="logout-heading logout-heading--success">You've been logged out</h2>
        <p class="logout-subtext">You can safely close this tab or return to the homepage.</p>
        <a href="/" class="btn btn-white">Go to Homepage</a>
      </tng-card-content>
    }
  </tng-card>
</div>
