# Trusted OAuth orchestration -> :4000; Angular authentication UI -> :4502.
server {
  listen 443 ssl;
  server_name auth-local.idnest.cloud;

  ssl_certificate     /opt/homebrew/etc/nginx/ssl/local.idnest.cloud.pem;
  ssl_certificate_key /opt/homebrew/etc/nginx/ssl/local.idnest.cloud-key.pem;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://kratos-local.idnest.cloud; img-src 'self' data: https://assets.idnest.cloud; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://kratos-local.idnest.cloud" always;

  location ^~ /auth/v1/ {
    proxy_pass http://localhost:4000;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location ^~ /auth/ {
    proxy_pass http://localhost:4502;
    proxy_http_version 1.1;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-Proto https;
  }

  location / {
    proxy_pass http://localhost:4000;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 80;
  server_name auth-local.idnest.cloud;
  return 301 https://$host$request_uri;
}
