# Angular admin frontend + admin-backend API
server {
    listen 80;
    server_name admin.idnest.cloud;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.idnest.cloud;

    ssl_certificate     /etc/nginx/ssl/idnest-cloud/idnest-cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/idnest-cloud/idnest-cloudflare-origin-key.pem;

    root /var/www/admin-frontend;
    index index.html;

    # Runtime browser configuration. Keep it same-origin with the BFF.
    location = /config.json {
        default_type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        return 200 '{"apiBaseUrl":"/api","authLogoutUrl":"https://auth.idnest.cloud/logout"}';
    }

    # Preserve the backend's /api prefix when proxying to Express.
    location /api/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_read_timeout 60s;
        add_header Cache-Control "no-store" always;
    }

    # Keep the existing backend health endpoint available to infrastructure.
    location = /health {
        proxy_pass http://127.0.0.1:4100/health;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        add_header Cache-Control "no-store" always;
    }

    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Angular client-side route fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
