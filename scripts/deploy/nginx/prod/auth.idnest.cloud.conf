# auth-backend: login / consent / logout / error pages -> :4000
# TLS: wildcard *.idnest.cloud cert (Let's Encrypt DNS-01).
server {
  listen 443 ssl;
  server_name auth.idnest.cloud;

  ssl_certificate     /etc/letsencrypt/live/idnest.cloud/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/idnest.cloud/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  location / {
    proxy_pass http://localhost:4000;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 80;
  server_name auth.idnest.cloud;
  return 301 https://$host$request_uri;
}
