# Trusted OAuth orchestration -> :4000; Angular authentication UI -> static files.
# TLS: wildcard *.idnest.cloud cert (Let's Encrypt DNS-01).
server {
  listen 443 ssl;
  server_name auth.idnest.cloud;

  ssl_certificate     /etc/letsencrypt/live/idnest.cloud/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/idnest.cloud/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://kratos.idnest.cloud; img-src 'self' data: https://assets.idnest.cloud; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://kratos.idnest.cloud" always;

  location ^~ /auth/v1/ {
    proxy_pass http://localhost:4000;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location ^~ /auth/ {
    alias /var/www/auth-frontend/browser/;
    try_files $uri $uri/ /auth/index.html;
  }

  location / {
    proxy_pass http://localhost:4000;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 80;
  server_name auth.idnest.cloud;
  return 301 https://$host$request_uri;
}
