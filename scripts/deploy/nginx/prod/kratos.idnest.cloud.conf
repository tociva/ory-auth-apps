# Kratos public: self-service flows, whoami, sessions -> :4433
server {
  listen 443 ssl;
  server_name kratos.idnest.cloud;

  ssl_certificate     /etc/letsencrypt/live/idnest.cloud/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/idnest.cloud/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  location / {
    proxy_pass http://localhost:4433;
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
  }
}

server {
  listen 80;
  server_name kratos.idnest.cloud;
  return 301 https://$host$request_uri;
}
