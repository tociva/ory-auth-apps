services:
  hydra:
    image: oryd/hydra:v26.2.0
    container_name: ory-hydra
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4444:4444"
      - "4445:4445"
    env_file:
      - ../../.env
    environment:
      - LOG_LEVEL=error #debug  
      # CORS applies to Hydra's PUBLIC endpoints (incl. /.well-known/openid-configuration
      # and /.well-known/jwks.json), which browser OIDC clients fetch cross-origin.
      # These must be the serve.public.cors.* keys — plain CORS_* keys are NOT
      # recognized by Hydra and are silently ignored.
      - SERVE_PUBLIC_CORS_ENABLED=true
      - SERVE_PUBLIC_CORS_ALLOWED_METHODS=GET,POST,PUT,DELETE,OPTIONS
      - SERVE_PUBLIC_CORS_ALLOWED_HEADERS=Authorization,Content-Type,Accept
      - SERVE_PUBLIC_CORS_ALLOW_CREDENTIALS=true
      # Cookie settings for CSRF protection
      - SERVE_COOKIES_SAME_SITE_MODE=Lax
      - SERVE_COOKIES_SAME_SITE_LEGACY_WORKAROUND=false
      - SERVE_COOKIES_SECURE=true  # Set to false if not using HTTPS in dev
      # Session settings
      - WEBFINGER_OIDC_DISCOVERY_SUPPORTED_SCOPES=openid,profile,email
      - WEBFINGER_OIDC_DISCOVERY_SUPPORTED_CLAIMS=sub,name,email
      # --- JWT token and TTL settings ---
      - STRATEGIES_ACCESS_TOKEN=jwt
      - TTL_ACCESS_TOKEN=5m
      - TTL_REFRESH_TOKEN=720h
      - LOG_LEAK_SENSITIVE_VALUES=false
      # Require PKCE for all public (no-secret) SPA/product clients. The admin
      # console uses a confidential BFF client instead.
      - OAUTH2_PKCE_ENFORCED_FOR_PUBLIC_CLIENTS=true

    entrypoint: >
      sh -c "export
      DSN=\"$$HYDRA_DSN\"
      URLS_SELF_ISSUER=\"$$HYDRA_URLS_SELF_ISSUER\"
      URLS_CONSENT=\"$$HYDRA_URLS_CONSENT\"
      URLS_LOGIN=\"$$HYDRA_URLS_LOGIN\"
      URLS_LOGOUT=\"$$HYDRA_URLS_LOGOUT\"
      URLS_POST_LOGOUT_REDIRECT=\"$$HYDRA_URLS_POST_LOGOUT_REDIRECT\"
      URLS_ERROR=\"$$HYDRA_URLS_ERROR\"
      SECRETS_SYSTEM=\"$$HYDRA_SECRETS_SYSTEM\"
      SERVE_PUBLIC_CORS_ALLOWED_ORIGINS=\"$$CORS_ALLOWED_ORIGINS\"
      SERVE_COOKIES_DOMAIN=\"$$KRATOS_COOKIES_DOMAIN\";
      exec hydra serve all --dev"
    networks:
      - ory-network

  ory-kratos:
    build:
      context: ../..
      dockerfile: scripts/docker/Dockerfile.kratos
    image: ory-kratos-envsubst:v25.4.0
    container_name: ory-kratos
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4433:4433"
      - "4434:4434"
    restart: unless-stopped
    env_file:
      - ../../.env
    volumes:
      - ../../config:/etc/config
    entrypoint: >
      sh -c "sh /usr/local/bin/render-kratos-config.sh
      && exec kratos serve -c /etc/config/kratos.yml --watch-courier"
    networks:
      - ory-network


networks:
  ory-network:
    driver: bridge
